# IPChecker 配置文件

# 玩家进入服务器后延迟检查时间（秒）
check-delay: 120

# 自动更新设置
auto-update:
  # 是否启用自动更新
  enabled: true
  # 检查更新间隔（小时）
  interval-hours: 24

# 存储设置
storage:
  # 使用 SQLite 存储（true）或 YAML 文件（false）
  use-sqlite: false

# 封禁过期时间（小时），0 表示永久封禁
ban-expire-hours: 0

# 是否显示 GeoIP 地理位置信息
show-geoip: true

# 是否启用配置热重载（检测 config.yml 修改自动重载）
config-hot-reload: true

# 玩家检查结果缓存时间（分钟），同一玩家在此时间内不会重复检查
player-cache-minutes: 60

# IP 库来源配置（支持多个 URL，按顺序尝试）
ip-databases:
  datacenter:
    - "https://cdn.jsdmirror.cn/gh/X4BNet/lists_vpn@main/output/datacenter/ipv4.txt"
  vpn:
    - "https://cdn.jsdmirror.cn/gh/X4BNet/lists_vpn@main/output/vpn/ipv4.txt"

# 是否记录封禁日志
log-enabled: true

# 消息配置
messages:
  # 玩家被 kick 时显示的消息
  kick: "&c检测到您的网络环境异常，请联系管理员"
  # 管理员收到的通知消息 ({player} 会被替换为玩家名)
  admin-notify: "&c[IPChecker] 玩家 {player} 使用 VPN/机房 IP 已被封禁"
